name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ghcr.io/zakaria09/instant-calendar:latest \
            --push .

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/zakaria09/instant-calendar:latest
            docker stop instant-calendar || true
            docker rm instant-calendar || true
            docker run -d --name instant-calendar -p 3000:3000 ghcr.io/zakaria09/instant-calendar:latest
            docker image prune -f