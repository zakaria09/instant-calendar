name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push images
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ghcr.io/zakaria09/instant-calendar-web:latest \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }} \
            --push .

          docker buildx build \
            --platform linux/amd64 \
            -t ghcr.io/zakaria09/instant-calendar-api:latest \
            -f apps/api/Dockerfile \
            --push .

      - name: Verify images
        run: |
          # Create a test network
          docker network create test-network

            # Start API container
            docker run --rm -d --name test-api \
              --network test-network \
              -p 3001:3001 \
              -e DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test \
              -e BETTER_AUTH_SECRET=test-secret \
              -e BETTER_AUTH_URL=http://localhost:3001 \
              -e WEB_URL=http://localhost:3000 \
              -e RESEND_API_KEY=test \
              -e EMAIL_FROM=test@test.com \
              -e PORT=3001 \
              ghcr.io/zakaria09/instant-calendar-api:latest

            # Wait up to 30 seconds for the health endpoint to respond
            echo "Waiting for API to be healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3001/api/health; then
                echo "API is healthy"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "API failed to become healthy"
                docker logs test-api
                docker stop test-api
                docker network rm test-network
                exit 1
              fi
              sleep 1
            done

            docker stop test-api

            # Start web container
            docker run --rm -d --name test-web \
              --network test-network \
              -p 3000:3000 \
              -e PORT=3000 \
              ghcr.io/zakaria09/instant-calendar-web:latest

            # Wait up to 30 seconds for web to respond
            echo "Waiting for web to be healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000; then
                echo "Web is healthy"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "Web failed to become healthy"
                docker logs test-web
                docker stop test-web
                docker network rm test-network
                exit 1
              fi
              sleep 1
            done

            docker stop test-web
            docker network rm test-network


      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          WEB_URL: ${{ secrets.WEB_URL }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,RESEND_API_KEY,EMAIL_FROM,WEB_URL,BETTER_AUTH_URL,BETTER_AUTH_SECRET,NEXT_PUBLIC_API_URL,NEXT_PUBLIC_APP_URL
          script: |
            cat > /root/instant-calendar.env <<ENV
            DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=${POSTGRES_DB}
            RESEND_API_KEY=${RESEND_API_KEY}
            EMAIL_FROM=${EMAIL_FROM}
            WEB_URL=${WEB_URL}
            BETTER_AUTH_URL=${BETTER_AUTH_URL}
            BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
            NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
            NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
            ENV

            cat > /root/docker-compose.yml <<'COMPOSE'
            services:
              web:
                image: ghcr.io/zakaria09/instant-calendar-web:latest
                ports:
                  - "3000:3000"
                env_file: /root/instant-calendar.env
                environment:
                  - PORT=3000

              api:
                image: ghcr.io/zakaria09/instant-calendar-api:latest
                ports:
                  - "3001:3001"
                env_file: /root/instant-calendar.env
                environment:
                  - PORT=3001
                depends_on:
                  db:
                    condition: service_healthy

              db:
                image: postgres:16-alpine
                env_file: /root/instant-calendar.env
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U postgres"]
                  interval: 5s
                  timeout: 5s
                  retries: 5

            volumes:
              postgres_data:
            COMPOSE

            docker pull ghcr.io/zakaria09/instant-calendar-web:latest
            docker pull ghcr.io/zakaria09/instant-calendar-api:latest

            cd /root
            docker compose down
            docker compose up -d

            # Wait for db to be healthy then run migrations
            sleep 15
            docker compose exec -T api node dist/apps/api/src/migrate.js

            docker image prune -f